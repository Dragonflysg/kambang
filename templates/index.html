<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-columns"></i>
                <h1>Kanban Board</h1>
            </div>
            <div class="header-actions">
                <button id="addTaskBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </div>
        </header>

        <!-- Kanban Board -->
        <main class="board-container">
            <div class="board">
                <!-- TO DO Column -->
                <div class="column" data-column="todo">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="column-icon todo-icon"><i class="fas fa-clipboard-list"></i></span>
                            <h2>TO DO</h2>
                            <span class="task-count" id="todo-count">0</span>
                        </div>
                    </div>
                    <div class="column-content" id="todo-tasks">
                        <!-- Tasks will be inserted here -->
                    </div>
                </div>

                <!-- DOING Column -->
                <div class="column" data-column="doing">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="column-icon doing-icon"><i class="fas fa-spinner"></i></span>
                            <h2>DOING</h2>
                            <span class="task-count" id="doing-count">0</span>
                        </div>
                    </div>
                    <div class="column-content" id="doing-tasks">
                        <!-- Tasks will be inserted here -->
                    </div>
                </div>

                <!-- DONE Column -->
                <div class="column" data-column="done">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="column-icon done-icon"><i class="fas fa-check-circle"></i></span>
                            <h2>DONE</h2>
                            <span class="task-count" id="done-count">0</span>
                        </div>
                    </div>
                    <div class="column-content" id="done-tasks">
                        <!-- Tasks will be inserted here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title..." required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="4" placeholder="Enter task description..."></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group" id="columnSelectGroup" style="display: none;">
                    <label for="taskColumn">Column</label>
                    <select id="taskColumn">
                        <option value="todo">To Do</option>
                        <option value="doing">Doing</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Delete Task</h2>
                <button class="close-btn" id="closeDeleteModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this task?</p>
                <p class="task-preview" id="deleteTaskTitle"></p>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
